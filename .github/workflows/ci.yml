name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# This workflow only reads the repo; never grant the default broader token.
permissions:
  contents: read

jobs:
  factuality:
    runs-on: ubuntu-latest
    steps:
      # Pinned to commit SHAs (not mutable tags) for supply-chain hardening.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.11'
      - run: pip install pytest

      # The factuality gate. These encode the rules the skill exists to keep:
      # never invent a salary, never guess Blue Card eligibility, never collapse
      # an unknown into a "no". If they fail, the skill is not trustworthy.
      - name: Factuality evals
        run: python3 -m pytest evals/ -q

      # SKILL.md must use only real frontmatter fields. Inventing fields (version,
      # tags, license) silently breaks skill loading.
      - name: Validate SKILL.md frontmatter
        run: |
          python3 - <<'PY'
          import re, sys
          src = open('SKILL.md').read()
          m = re.match(r'^---\n(.*?)\n---\n', src, re.S)
          if not m:
              sys.exit('SKILL.md has no frontmatter')
          fm = m.group(1)
          REAL = {'name','description','when_to_use','argument-hint','arguments',
                  'disable-model-invocation','user-invocable','allowed-tools',
                  'disallowed-tools','model','effort','context','agent','hooks','paths','shell'}
          keys = [l.split(':')[0] for l in fm.split('\n') if l and not l.startswith((' ', '\t', '#'))]
          bad = [k for k in keys if k not in REAL]
          if bad:
              sys.exit(f'Invalid frontmatter fields: {bad}')
          d = re.search(r'^description: (.*)$', fm, re.M).group(1)
          w = re.search(r'^when_to_use: (.*)$', fm, re.M)
          total = len(d) + (len(w.group(1)) if w else 0)
          if total > 1536:
              sys.exit(f'description + when_to_use = {total} chars, cap is 1536')
          print(f'frontmatter OK: {keys}, {total}/1536 chars')
          PY

      # The refusal rules ARE the product. Assert they are present, rather than
      # grepping for the absence of a string — the docs legitimately discuss
      # auto-apply tools in order to refuse them, so a naive negative grep
      # false-positives on its own trust policy.
      - name: Refusal rules are present
        run: |
          python3 - <<'PY'
          import sys
          skill = open('SKILL.md').read().lower()
          policy = open('references/trust-policy.md').read().lower()

          required_in_skill = [
              'never auto-apply',          # no submission, ever
              'never invent',              # no fabricated salary/visa/language
              'never fabricate',           # no invented candidate experience
              'never send the cv',         # CV stays local
          ]
          missing = [r for r in required_in_skill if r not in skill]
          if missing:
              sys.exit(f'SKILL.md is missing its hard rules: {missing}')

          if 'never auto-apply' not in policy:
              sys.exit('trust-policy.md no longer refuses auto-apply')

          # The skill must route the human to the apply link, never open it.
          if 'the human applies' not in skill and 'the human clicks it' not in skill:
              sys.exit('SKILL.md no longer states that the human does the applying')

          print('refusal rules intact')
          PY
